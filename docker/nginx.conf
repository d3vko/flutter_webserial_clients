server {
    listen 8090;
    listen [::]:8090;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "serial=(self)" always;
    # MapLibre GL JS (unpkg), CanvasKit (gstatic), and map style/tile hosts must be allowed.
    # See docs/SECURITY.md — reverse proxies must not strip or override this with a stricter CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://font.americanamap.org https://tiles.openfreemap.org; connect-src 'self' https: https://www.gstatic.com https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the SPA shell — avoids stale map code after redeploys.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "serial=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://font.americanamap.org https://tiles.openfreemap.org; connect-src 'self' https: https://www.gstatic.com https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    }

    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "serial=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://font.americanamap.org https://tiles.openfreemap.org; connect-src 'self' https: https://www.gstatic.com https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    }

    location = /flutter_bootstrap_loader.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "serial=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://font.americanamap.org https://tiles.openfreemap.org; connect-src 'self' https: https://www.gstatic.com https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    }

    # Flutter app bundle — filename is not hashed; must not be cached as immutable.
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /flutter.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "serial=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://www.gstatic.com https://unpkg.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://font.americanamap.org https://tiles.openfreemap.org; connect-src 'self' https: https://www.gstatic.com https://cloudflareinsights.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;
    }

    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Flutter metadata changes every build — must not use immutable cache.
    location = /assets/AssetManifest.bin.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /assets/AssetManifest.bin {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /assets/FontManifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Hashed assets only — safe for long cache.
    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }

    location ~* \.(css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public" always;
    }
}
